<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Chiavi d'Italia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-intro">
  <canvas id="matrix"></canvas>

  <main class="overlay intro-layout">
    <section class="intro-box">
      <h1 class="site-title">LE CHIAVI D'ITALIA</h1>
      <p class="site-subtitle">La caccia al tesoro ha inizio</p>

      <div class="egypt-quote">
        “Non tutti arrivano fin qui.<br>
        Tu sì.<br><br>
        Questo significa che possiedi qualcosa di raro.<br><br>
        Ora vediamo fin dove puoi spingerti...”
      </div>

      <button class="enter-btn egypt-btn" onclick="window.location.href='hub.html'">
        ENTRA
      </button>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    const letters = "𓂀𓆣𓅓𓋹𓃭𓂋0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 18;
    let columns = 0;
    let drops = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(window.innerWidth / fontSize);
      drops = Array(columns).fill(1);
    }

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#d4af37";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(draw, 38);
  </script>
</body>
</html>
