<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Chiavi d'Italia</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="page-simple">

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<!-- CONTENUTO -->
<main class="overlay">

  <div class="intro-box">

    <h1 class="site-title">LE CHIAVI D'ITALIA</h1>

    <div class="site-subtitle">La caccia al tesoro ha inizio</div>

    <p class="egypt-quote">"Non tutti arrivano fin qui."</p>
    <p class="egypt-quote">Tu sì.</p>
    <p class="egypt-quote">Questo significa che possiedi qualcosa di raro.</p>
    <p class="egypt-quote">Ora vediamo fin dove puoi spingerti...</p>

    <button class="enter-btn" onclick="window.location.href='hub.html'">ENTRA</button>

  </div>

</main>

<!-- MATRIX SCRIPT -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// SOLO QUI abbiamo cambiato i simboli
const letters = "𓂀𓆣𓅓𓋹𓃭𓂋𓁹𓆑𓊃𓏏𓈖𓍿01234567𓀀𓀁𓀂𓀃𓀄𓀅𓀆𓀇𓀈𓀉𓀊𓀋𓀌𓀍𓀎𓀏𓀐𓀑𓀒𓀓𓀔𓀕𓀖𓀗𓀘𓀙𓀚𓀛𓀜𓀝𓀞𓀟𓀠𓀡𓀢𓀣𓀤𓀥𓀦𓀧𓀨𓀩𓀪𓀫𓀬𓀭𓀮𓀯𓀰𓀱𓀲𓀳𓀴𓀵89";

const fontSize = 12;
const columns = Math.floor(canvas.width / fontSize);

const drops = [];
for (let i = 0; i < columns; i++) {
  drops[i] = Math.random() * canvas.height;
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.50)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffd700";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));

    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
