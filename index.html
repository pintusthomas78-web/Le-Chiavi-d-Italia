<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Chiavi d'Italia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-intro">
  <canvas id="matrix"></canvas>

  <main class="overlay intro-layout">
    <section class="intro-box">
      <h1 class="site-title">LE CHIAVI D'ITALIA</h1>
      <p class="site-subtitle">La caccia al tesoro ha inizio</p>

      <div class="egypt-quote">
        “Non tutti arrivano fin qui.<br>
        Tu sì.<br><br>
        Questo significa che possiedi qualcosa di raro.<br><br>
        Ora vediamo fin dove puoi spingerti...”
      </div>

      <button class="enter-btn egypt-btn" onclick="window.location.href='hub.html'">
        ENTRA
      </button>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    const letters = "𓂀𓆣𓅓𓋹𓃭𓂋01234EFGOPQRSUVWXYZ";
    const fontSize = 10;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffea00";
  ctx.shadowColor = "#ffd700";
  ctx.shadowBlur = 8;
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    ctx.fillText(text, i * fontSize, drops[i] * fontSize - 2);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(draw, 38);
  </script>
</body>
</html>
