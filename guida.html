<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guida - Le Chiavi d'Italia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-simple">
  <canvas id="matrix"></canvas>

  <main class="overlay simple-page">
    <div class="simple-box">
      <h1>Guida</h1>
      <p>
        Benvenuto ne <strong>Le Chiavi d'Italia</strong>.<br><br>
        Ogni libro contiene indizi, simboli, parole e dettagli nascosti.<br>
        Risolvendo correttamente gli enigmi otterrai un codice da inserire nel sito per avanzare di livello.<br><br>
        Solo chi completerà l'intero percorso potrà arrivare alla chiave finale.
      </p>

      <button class="egypt-btn" onclick="window.location.href='hub.html'">TORNA INDIETRO</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    const letters = "𓂀𓆣𓅓𓋹𓃭𓂋0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 18;
    let columns = 0, drops = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(window.innerWidth / fontSize);
      drops = Array(columns).fill(1);
    }

    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "#d4af37";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(draw, 38);
  </script>
</body>
</html>
