<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Le Chiavi d'Italia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: gold;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 40%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 40px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      color: #ccc;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      background: gold;
      border: none;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: orange;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>LE CHIAVI D'ITALIA</h1>
  <p>La caccia al tesoro è iniziata...</p>
  <button 
    onclick="entra()">ENTRA</button>
<script>
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize = 16;
  const columns = canvas.width / fontSize;

  const drops = [];
  for (let x = 0; x < columns; x++) {
    drops[x] = 1;
  }

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "gold";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random() * letters.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(draw, 33);

  function startGame() {
    alert("Benvenuto nella caccia al tesoro!");
  }
</script>

</body>
</html>
function entra() {
    window.location.href = "gioco.html";
}
