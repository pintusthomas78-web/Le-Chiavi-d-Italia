<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso - Le Chiavi d'Italia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-simple">
  <canvas id="matrix"></canvas>

  <main class="overlay simple-page">
    <div class="simple-box">
      <h1>Accesso</h1>

      <form class="access-form" onsubmit="entra(event)">
        <input type="text" id="nome" placeholder="Nome utente" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit" class="egypt-btn">ENTRA</button>
      </form>

      <button class="egypt-btn secondary-btn" onclick="window.location.href='hub.html'">TORNA INDIETRO</button>
    </div>
  </main>

  <script>
    function entra(event) {
      event.preventDefault();
      const nome = document.getElementById("nome").value;
      localStorage.setItem("utenteNome", nome);
      alert("Accesso eseguito con successo");
      window.location.href = "gioco.html";
    }

    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    const letters = "𓂀𓆣𓅓𓋹𓃭𓂋0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 18;
    let columns = 0, drops = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(window.innerWidth / fontSize);
      drops = Array(columns).fill(1);
    }

    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "#d4af37";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(draw, 38);
  </script>
</body>
</html>
